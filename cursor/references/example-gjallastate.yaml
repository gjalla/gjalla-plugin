# ── Architecture ──────────────────────────────────────────────────────────────
# System containers, components, and external systems.
# Relationships are inline — an element declares its connections.

architecture:
  api-server:
    type: container
    category: Backend
    c4_depth: container
    description: Express.js API server handling all REST endpoints
    facts:
      - Handles authentication via Clerk middleware
      - Uses Drizzle ORM for database access
      - Runs on port 3001 in development
    status: implemented
    parent: null
    relationships:
      postgres:
        type: sync
        protocol: TCP/PostgreSQL
        description: Primary data store
        facts:
          - Connection pooling via pg-pool
          - All queries go through Drizzle ORM
      stripe-api:
        type: sync
        protocol: REST/HTTPS
        description: Payment processing
        facts:
          - Uses idempotency keys for all mutations
          - Webhook verification via Stripe signature

  payment-service:
    type: component
    category: Backend
    c4_depth: component
    description: Processes payments and refunds via Stripe
    facts:
      - Handles PCI-scoped data
      - Stateless — no local payment state
      - Retries failed charges up to 3 times
    status: implemented
    parent: api-server
    relationships:
      stripe-api:
        type: sync
        protocol: REST/HTTPS
        description: Payment processing and refund requests
        facts:
          - Uses idempotency keys for all mutations

  web-app:
    type: container
    category: Frontend
    c4_depth: container
    description: React SPA served via Vite
    facts:
      - Uses TanStack Query for server state
      - Route-based code splitting
      - Authentication state managed via Clerk React SDK
    status: implemented
    parent: null
    relationships:
      api-server:
        type: sync
        protocol: REST/HTTPS
        description: All data fetching and mutations
        facts:
          - JSON request/response format
          - Bearer token auth on every request

  postgres:
    type: external_system
    category: Infrastructure
    c4_depth: null
    description: PostgreSQL database (Neon serverless)
    facts:
      - Serverless Postgres via Neon
      - Auto-scales to zero on idle
    status: null
    parent: null
    relationships: {}

  stripe-api:
    type: external_system
    category: External
    c4_depth: null
    description: Stripe payment processing API
    facts: []
    status: null
    parent: null
    relationships: {}

# ── Data Model ────────────────────────────────────────────────────────────────
# Domain entities with attributes, relationships, and behavioral facts.

data_model:
  entities:
    Order:
      description: Customer purchase record
      domain: commerce
      sensitivity: pii
      facts:
        - Status follows draft -> pending -> confirmed -> fulfilled lifecycle
        - Soft-deleted, never hard-deleted
      attributes:
        - { name: id, type: uuid, required: true, unique: true }
        - { name: customer_id, type: uuid, required: true }
        - { name: total, type: decimal, required: true }
        - { name: status, type: enum, required: true }
        - { name: created_at, type: timestamp, required: true }
      relationships:
        - { target: Customer, type: manyToOne, description: Purchasing customer }
        - { target: LineItem, type: oneToMany, description: Items in order }

    Customer:
      description: Registered user with billing info
      domain: identity
      sensitivity: pii
      facts:
        - Email is the unique identifier
        - Synced from Clerk on first login
      attributes:
        - { name: id, type: uuid, required: true, unique: true }
        - { name: email, type: string, required: true, unique: true }
        - { name: clerk_id, type: string, required: true }
      relationships:
        - { target: Order, type: oneToMany, description: Customer's orders }

# ── Capabilities ──────────────────────────────────────────────────────────────
# What the system can do, with acceptance criteria.

capabilities:
  payment-processing:
    description: Accept and process customer payments
    status: active
    acceptance_criteria:
      - Supports credit card and ACH payments
      - Generates receipts on successful charge
      - Handles refunds within 30-day window

  order-management:
    description: Create, track, and fulfill customer orders
    status: active
    acceptance_criteria:
      - Orders follow defined lifecycle states
      - Email notifications on status changes

  user-authentication:
    description: User signup, login, and session management
    status: active
    acceptance_criteria:
      - OAuth via Google and GitHub
      - Session tokens via Clerk

# ── Tech Stack ────────────────────────────────────────────────────────────────

tech_stack:
  express:
    type: framework
    vendor: OpenJS Foundation

  react:
    type: framework
    vendor: Meta

  drizzle:
    type: orm
    vendor: Drizzle Team

  clerk:
    type: auth_provider
    vendor: Clerk

  neon:
    type: database
    vendor: Neon

# ── API Surface ───────────────────────────────────────────────────────────────

surface_area:
  "POST /api/payments/charge":
    type: api_endpoint
    summary: Initiate a payment charge
    auth_required: true

  "GET /api/orders":
    type: api_endpoint
    summary: List orders for authenticated user
    auth_required: true

  "POST /api/orders":
    type: api_endpoint
    summary: Create a new order
    auth_required: true

  "GET /api/orders/:id":
    type: api_endpoint
    summary: Get order details
    auth_required: true

# ── External Services ─────────────────────────────────────────────────────────

services:
  stripe:
    description: Payment processing provider
    service_type: infrastructure
    facts:
      - Used for card payments, ACH, and refunds
      - Webhook events for async payment status updates

  clerk:
    description: Authentication and user management
    service_type: infrastructure
    facts:
      - Handles OAuth flows and session management
      - User data synced to local DB on first login

  neon:
    description: Serverless PostgreSQL provider
    service_type: infrastructure
    facts:
      - Auto-scales to zero
      - Branching for preview environments
